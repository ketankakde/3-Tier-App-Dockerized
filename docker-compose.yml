services:
  database:
    container_name: database
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: redhat
      MYSQL_DATABASE: test_db
      MYSQL_ROOT_HOST: "%"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -predhat"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    container_name: backend
    image: backend:1.0
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: redhat
      DB_NAME: test_db
    ports:
      - "5000:5000"

  frontend:
    container_name: frontend
    image: frontend:1.0
    ports:
      - "8080:80"
    depends_on:
      - backend
